name: Release builds

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: nightly
        type: choice
        options:
          - nightly
          - stable
      version:
        description: Optional release version, for example 0.1.0 or 0.1.0-nightly.20260511.1
        required: false
        type: string
  schedule:
    - cron: "0 7 * * *"
  push:
    tags:
      - "v*.*.*"
      - "!v*-nightly.*"

permissions:
  contents: read
  checks: read

concurrency:
  group: release-builds-${{ github.event_name == 'workflow_dispatch' && format('{0}-{1}', github.ref, inputs.channel) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'schedule' }}

jobs:
  meta:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.release.outputs.channel }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_name: ${{ steps.release.outputs.release_name }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      make_latest: ${{ steps.release.outputs.make_latest }}
      ref: ${{ steps.release.outputs.ref }}
      short_sha: ${{ steps.release.outputs.short_sha }}
      should_release: ${{ steps.release.outputs.should_release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - id: release
        name: Resolve channel and version
        shell: bash
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          short_sha="$(git rev-parse --short HEAD)"
          ref="${GITHUB_SHA}"

          should_release="true"

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            channel="nightly"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            channel="${INPUT_CHANNEL:-nightly}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            channel="stable"
          else
            echo "Unsupported release event: ${GITHUB_EVENT_NAME}" >&2
            exit 1
          fi

          if [[ "${channel}" != "stable" && "${channel}" != "nightly" ]]; then
            echo "Unsupported release channel: ${channel}" >&2
            exit 1
          fi

          if [[ "${channel}" == "stable" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              raw_version="${GITHUB_REF_NAME}"
            else
              raw_version="${INPUT_VERSION}"
            fi
            if [[ -z "${raw_version}" ]]; then
              echo "Stable workflow_dispatch releases require the version input." >&2
              exit 1
            fi
            version="${raw_version#v}"
            prerelease="false"
            make_latest="true"
            release_name="OpenPond App v${version}"
          else
            if [[ -n "${INPUT_VERSION}" ]]; then
              version="${INPUT_VERSION#v}"
            else
              base_version="$(node -p "require('./apps/desktop/package.json').version.split('-')[0]")"
              nightly_date="$(date -u +%Y%m%d)"
              version="${base_version}-nightly.${nightly_date}.${GITHUB_RUN_NUMBER}"
            fi
            prerelease="true"
            make_latest="false"
            release_name="OpenPond App Nightly v${version}"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            latest_nightly_tag="$(git tag --sort=-creatordate --list 'v*-nightly.*' | head -n 1)"
            if [[ -n "${latest_nightly_tag}" ]]; then
              latest_nightly_sha="$(git rev-list -n 1 "${latest_nightly_tag}")"
              if [[ "${latest_nightly_sha}" == "${GITHUB_SHA}" ]]; then
                should_release="false"
              fi
            fi
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${version}" >&2
            exit 1
          fi

          {
            echo "channel=${channel}"
            echo "version=${version}"
            echo "tag=v${version}"
            echo "release_name=${release_name}"
            echo "prerelease=${prerelease}"
            echo "make_latest=${make_latest}"
            echo "ref=${ref}"
            echo "short_sha=${short_sha}"
            echo "should_release=${should_release}"
          } >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: steps.release.outputs.channel == 'stable'
        with:
          bun-version: "1.3.13"

      - name: Verify stable source version
        if: steps.release.outputs.channel == 'stable'
        run: bun run release:version:check -- --version "${{ steps.release.outputs.version }}"

  ci_gate:
    name: Require green CI
    needs: meta
    if: needs.meta.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the required CI check on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ needs.meta.outputs.ref }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            check_run="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_SHA}/check-runs" \
              --jq '[.check_runs[] | select(.name == "Checks" and .app.slug == "github-actions")] | sort_by(.started_at) | last // {}')"
            status="$(jq -r '.status // empty' <<<"${check_run}")"
            conclusion="$(jq -r '.conclusion // empty' <<<"${check_run}")"
            url="$(jq -r '.html_url // empty' <<<"${check_run}")"
            if [[ "${status}" == "completed" && "${conclusion}" == "success" ]]; then
              echo "Required CI check passed: ${url}"
              exit 0
            fi
            if [[ "${status}" == "completed" && -n "${conclusion}" ]]; then
              echo "Required CI check concluded ${conclusion}: ${url}" >&2
              exit 1
            fi
            echo "Waiting for required CI check on ${RELEASE_SHA} (attempt ${attempt}/60)."
            sleep 10
          done
          echo "Timed out waiting for the required Checks result on ${RELEASE_SHA}." >&2
          exit 1

  source_artifacts:
    name: Build release source artifacts once
    needs: [meta, ci_gate]
    if: needs.meta.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.meta.outputs.ref }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - name: Prepare release build config
        run: bun scripts/prepare-release.ts --channel "${{ needs.meta.outputs.channel }}" --version "${{ needs.meta.outputs.version }}"

      - run: bun run build:artifacts
      - run: bun run cli:build

      - name: Stage release source artifacts
        run: bun run release:source-artifacts:stage

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-source-artifacts
          path: release-source-artifacts
          if-no-files-found: error

  build:
    name: ${{ matrix.name }}
    needs: [meta, source_artifacts]
    if: needs.meta.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-appimage
            os: ubuntu-24.04
            package_script: package:linux:release
          - name: linux-arm64-appimage
            os: ubuntu-24.04-arm
            package_script: package:linux:release
          - name: mac-arm64-zip
            os: macos-15
            package_script: package:mac:release
          - name: mac-x64-zip
            os: macos-15-intel
            package_script: package:mac:release
          # Temporarily disabled while Windows release builds are unstable.
          # - name: windows-nsis
          #   os: windows-latest
          #   package_script: package:win:release

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.meta.outputs.ref }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-source-artifacts
          path: .

      - name: Prepare release build config
        run: bun scripts/prepare-release.ts --channel "${{ needs.meta.outputs.channel }}" --version "${{ needs.meta.outputs.version }}"

      - run: bun run ${{ matrix.package_script }}

      - name: Enforce desktop package budgets
        run: bun run budgets:desktop-package

      - name: Build and verify native CLI archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bun run cli:release:build
          cli_archive="$(find release -maxdepth 1 -type f -name 'openpond-cli-*.tar.gz' -print -quit)"
          test -n "${cli_archive}"
          bun scripts/check-cli-distribution.ts --archive "${cli_archive}" --skip-npm

      - name: Install Linux packaged-smoke display dependency
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Prove renderer commit boundaries in the dev browser harness
        if: matrix.name == 'linux-x64-appimage'
        shell: bash
        run: |
          mkdir -p release-smoke
          xvfb-run -a bun run smoke:desktop:dev -- --skip-chat --json release-smoke/dev-render-commits.json

      - name: Smoke packaged desktop
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-smoke
          report_path="release-smoke/smoke-${{ matrix.name }}.json"
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            xvfb-run -a bun run smoke:desktop:packaged -- --json "${report_path}"
          else
            bun run smoke:desktop:packaged -- --json "${report_path}"
          fi

      - name: Upload packaged smoke diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: packaged-smoke-${{ matrix.name }}
          path: release-smoke/**
          if-no-files-found: warn

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          files=(release/*.AppImage release/*.zip release/*.exe release/*.blockmap release/*.yml release/*.tar.gz)
          for index in "${!files[@]}"; do
            if [[ "$(basename "${files[$index]}")" == "builder-debug.yml" ]]; then
              unset 'files[$index]'
            fi
          done
          if (( ${#files[@]} == 0 )); then
            echo "No release assets were produced." >&2
            exit 1
          fi
          cp "${files[@]}" release-publish/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: desktop-${{ matrix.name }}
          path: release-publish/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [meta, build]
    if: needs.meta.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.meta.outputs.ref }}
          fetch-depth: 0

      - name: Fetch release tags
        run: git fetch --force --tags origin

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: packaged-smoke-*
          merge-multiple: true
          path: release-smoke-artifacts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-source-artifacts
          path: .

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Validate packaged smoke reports
        run: bun run smoke:desktop:packaged:validate -- --dir release-smoke-artifacts

      - id: npm_publish_auth
        name: Resolve npm publishing availability
        if: needs.meta.outputs.channel == 'stable'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping npm publish because the NPM_TOKEN repository secret is not configured."
          fi

      - name: Publish stable CLI package to npm
        if: needs.meta.outputs.channel == 'stable' && steps.npm_publish_auth.outputs.enabled == 'true'
        env:
          NPM_CONFIG_PROVENANCE: "true"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          test "$(node -p "require('./apps/cli/package.json').version")" = "${{ needs.meta.outputs.version }}"
          npm install --global npm@11.5.1
          npm publish ./apps/cli --access public --provenance --ignore-scripts

      - name: Generate SBOM
        run: bun run release:sbom

      - name: Generate release inventory
        run: bun run release:inventory -- --release-assets release-assets --channel "${{ needs.meta.outputs.channel }}" --version "${{ needs.meta.outputs.version }}"

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          checksum_file="$(mktemp)"
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf "%P\0" | sort -z | xargs -0 sha256sum > "${checksum_file}"
          mv "${checksum_file}" SHA256SUMS.txt

      - id: release_notes
        name: Resolve release notes range
        env:
          RELEASE_CHANNEL: ${{ needs.meta.outputs.channel }}
          RELEASE_TAG: ${{ needs.meta.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ "${RELEASE_CHANNEL}" == "stable" ]]; then
            previous_tag="$(
              git tag --merged HEAD --sort=-v:refname --list 'v[0-9]*.[0-9]*.[0-9]*' \
                | grep -Ev '(-nightly\.|^'"${RELEASE_TAG}"'$)' \
                | head -n 1 \
                || true
            )"
          else
            previous_tag="$(
              git tag --merged HEAD --sort=-creatordate --list 'v*-nightly.*' \
                | grep -v '^'"${RELEASE_TAG}"'$' \
                | head -n 1 \
                || true
            )"
          fi

          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        if: steps.release_notes.outputs.previous_tag != ''
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          target_commitish: ${{ needs.meta.outputs.ref }}
          name: ${{ needs.meta.outputs.release_name }}
          generate_release_notes: true
          previous_tag: ${{ steps.release_notes.outputs.previous_tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          make_latest: ${{ needs.meta.outputs.make_latest }}
          files: release-assets/*
          fail_on_unmatched_files: true

      - name: Publish first release
        if: steps.release_notes.outputs.previous_tag == ''
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          target_commitish: ${{ needs.meta.outputs.ref }}
          name: ${{ needs.meta.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ needs.meta.outputs.prerelease }}
          make_latest: ${{ needs.meta.outputs.make_latest }}
          files: release-assets/*
          fail_on_unmatched_files: true
