name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: "11.13.0"
          cache: true
          cache_dependency_path: pnpm-lock.yaml

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run cli:typecheck
      - run: pnpm run agent-sdk:typecheck
      - run: pnpm run build:artifacts
      - run: pnpm run cli:build
      - run: pnpm run budgets:cli:check
      - run: pnpm run budgets:check
      - run: pnpm run structure:check
      - run: pnpm run reachability:check
      - run: pnpm run dependencies:check
      - run: pnpm run hygiene:check
      - run: pnpm run workflows:check

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: verified-build-${{ github.sha }}
          path: |
            apps/server/dist
            apps/web/dist
            apps/desktop/dist
            apps/cli/dist
            packages/cloud/dist
          if-no-files-found: error

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: "11.13.0"
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - name: Install image inspection dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:unit

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: "11.13.0"
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:integration
      - run: pnpm run test:python

  contract:
    name: Runtime contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: "11.13.0"
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:contract

  release_smoke:
    name: Release artifact smoke
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: "11.13.0"
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: verified-build-${{ github.sha }}
          # Preserve workspace-relative paths for app and package build outputs.
          path: .
      - run: pnpm run test:release
        env:
          OPENPOND_TEST_REUSE_BUILD: "1"

  checks:
    name: Checks
    if: always()
    needs: [quality, unit, integration, contract, release_smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Require every CI lane
        env:
          QUALITY: ${{ needs.quality.result }}
          UNIT: ${{ needs.unit.result }}
          INTEGRATION: ${{ needs.integration.result }}
          CONTRACT: ${{ needs.contract.result }}
          RELEASE_SMOKE: ${{ needs.release_smoke.result }}
        run: |
          set -euo pipefail
          results=("${QUALITY}" "${UNIT}" "${INTEGRATION}" "${CONTRACT}" "${RELEASE_SMOKE}")
          for result in "${results[@]}"; do
            test "${result}" = "success"
          done
