name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run cli:typecheck
      - run: bun run agent-sdk:typecheck
      - run: bun run build:artifacts
      - run: bun run cli:build
      - run: bun run budgets:cli:check
      - run: bun run budgets:check
      - run: bun run structure:check
      - run: bun run dependencies:check

      - uses: actions/upload-artifact@v7
        with:
          name: verified-build-${{ github.sha }}
          path: |
            apps/server/dist
            apps/web/dist
            apps/desktop/dist
            apps/cli/dist
          if-no-files-found: error

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bun run test:unit

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: astral-sh/setup-uv@v8.3.2
      - run: bun install --frozen-lockfile
      - run: bun run test:integration

  contract:
    name: Runtime contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bun run test:contract

  release_smoke:
    name: Release artifact smoke
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: verified-build-${{ github.sha }}
          # upload-artifact strips the shared `apps/` ancestor from these paths.
          path: apps
      - run: bun run test:release
        env:
          OPENPOND_TEST_REUSE_BUILD: "1"

  checks:
    name: Checks
    if: always()
    needs: [quality, unit, integration, contract, release_smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Require every CI lane
        env:
          QUALITY: ${{ needs.quality.result }}
          UNIT: ${{ needs.unit.result }}
          INTEGRATION: ${{ needs.integration.result }}
          CONTRACT: ${{ needs.contract.result }}
          RELEASE_SMOKE: ${{ needs.release_smoke.result }}
        run: |
          set -euo pipefail
          results=("${QUALITY}" "${UNIT}" "${INTEGRATION}" "${CONTRACT}" "${RELEASE_SMOKE}")
          for result in "${results[@]}"; do
            test "${result}" = "success"
          done
