name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - uses: astral-sh/setup-uv@v8.3.2

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run cli:typecheck

      - run: bun run agent-sdk:typecheck

      - run: bun run build

      - run: bun run cli:build

      - run: bun run budgets:cli

      - run: bun run budgets:warn

      - run: bun run budgets:check

      - run: bun run structure:check
      - run: bun run dependencies:check

      - run: bun run test
        env:
          OPENPOND_SKIP_CI_LONG_CLI_TESTS: "1"
