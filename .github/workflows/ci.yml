name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run build

      - run: bun run budgets:warn

      - run: bun run test
