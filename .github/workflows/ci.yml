name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run cli:typecheck
      - run: bun run agent-sdk:typecheck
      - run: bun run build:artifacts
      - run: bun run cli:build
      - run: bun run budgets:cli:check
      - run: bun run budgets:check
      - run: bun run structure:check
      - run: bun run reachability:check
      - run: bun run dependencies:check
      - run: bun run hygiene:check
      - run: bun run workflows:check

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: verified-build-${{ github.sha }}
          path: |
            apps/server/dist
            apps/web/dist
            apps/desktop/dist
            apps/cli/dist
          if-no-files-found: error

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bun run test:unit

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: bun install --frozen-lockfile
      - run: bun run test:integration
      - run: bun run test:python

  contract:
    name: Runtime contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bun run test:contract

  release_smoke:
    name: Release artifact smoke
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: verified-build-${{ github.sha }}
          # upload-artifact strips the shared `apps/` ancestor from these paths.
          path: apps
      - run: bun run test:release
        env:
          OPENPOND_TEST_REUSE_BUILD: "1"

  checks:
    name: Checks
    if: always()
    needs: [quality, unit, integration, contract, release_smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Require every CI lane
        env:
          QUALITY: ${{ needs.quality.result }}
          UNIT: ${{ needs.unit.result }}
          INTEGRATION: ${{ needs.integration.result }}
          CONTRACT: ${{ needs.contract.result }}
          RELEASE_SMOKE: ${{ needs.release_smoke.result }}
        run: |
          set -euo pipefail
          results=("${QUALITY}" "${UNIT}" "${INTEGRATION}" "${CONTRACT}" "${RELEASE_SMOKE}")
          for result in "${results[@]}"; do
            test "${result}" = "success"
          done
